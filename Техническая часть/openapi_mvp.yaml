        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationActRequest'
      responses:
        '202':
          description: Reconciliation act request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRequestResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /admin/users:
