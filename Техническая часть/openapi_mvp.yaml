  /me/training-applications:
    get:
      tags:
        - Training
      summary: List current user's training applications
      operationId: listMyTrainingApplications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Training application list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyTrainingApplicationListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ClientApplicationCreateRequest:
      type: object
      additionalProperties: false
      required:
        - companyName
        - inn
        - kpp
        - contactName
        - email
        - phone
      properties:
        companyName:
          type: string
          minLength: 1
          maxLength: 255
        inn:
          type: string
          minLength: 10
          maxLength: 12
        kpp:
          type: string
          minLength: 9
          maxLength: 9
        contactName:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 6
          maxLength: 32
        comment:
          type: string
          maxLength: 2000
    ClientApplicationCreateResponse:
      type: object
      additionalProperties: false
      required:
        - applicationGuid
        - status
        - message
      properties:
        applicationGuid:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - submitted
        message:
          type: string
    InvitationAcceptRequest:
      type: object
      additionalProperties: false
      required:
        - token
        - password
        - passwordConfirmation
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          maxLength: 255
        passwordConfirmation:
          type: string
          minLength: 8
          maxLength: 255
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 255
    RefreshTokenRequest:
      type: object
      additionalProperties: false
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          minLength: 1
    LogoutRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken:
          type: string
          minLength: 1
    ForgotPasswordRequest:
      type: object
      additionalProperties: false
      required:
        - email
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      required:
        - token
        - password
        - passwordConfirmation
      properties:
        token:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
          maxLength: 255
        passwordConfirmation:
          type: string
          minLength: 8
          maxLength: 255
    UpdateMeRequest:
      type: object
      additionalProperties: false
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 6
          maxLength: 32
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      required:
        - currentPassword
        - newPassword
        - newPasswordConfirmation
      properties:
        currentPassword:
          type: string
          minLength: 1
          maxLength: 255
        newPassword:
          type: string
          minLength: 8
          maxLength: 255
        newPasswordConfirmation:
          type: string
          minLength: 8
          maxLength: 255
    AuthTokenResponse:
      type: object
      additionalProperties: false
      required:
        - tokenType
        - accessToken
        - refreshToken
        - expiresIn
      properties:
        tokenType:
          type: string
          enum:
            - Bearer
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          minimum: 1
    MeResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - email
        - fullName
        - phone
        - role
        - companyId
        - companyName
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        phone:
          type: string
        role:
          type: string
          enum:
            - master
            - purchaser
            - accountant
        companyId:
          type: string
          format: uuid
        companyName:
          type: string
    CompanySummaryResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - counterpartyGuid
        - name
        - inn
        - kpp
        - isActiveForPlatform
      properties:
        id:
          type: string
          format: uuid
        counterpartyGuid:
          type: string
        name:
          type: string
        inn:
          type: string
        kpp:
          type: string
        legalAddress:
          type: string
        paymentTerms:
          $ref: '#/components/schemas/PaymentTerms'
        isActiveForPlatform:
          type: boolean
    CompanyUserRole:
      type: string
      enum:
        - master
        - purchaser
        - accountant
    CompanyUserAccessStatus:
      type: string
      enum:
        - invited
        - active
        - disabled
    CompanyUser:
      type: object
      additionalProperties: false
      required:
        - id
        - fullName
        - email
        - role
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type:
            - string
            - 'null'
        role:
          $ref: '#/components/schemas/CompanyUserRole'
        status:
          $ref: '#/components/schemas/CompanyUserAccessStatus'
        createdAt:
          type: string
          format: date-time
    CompanyUserResponse:
      type: object
      additionalProperties: false
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/CompanyUser'
    CompanyUserListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CompanyUser'
    CompanyUserInviteRequest:
      type: object
      additionalProperties: false
      required:
        - fullName
        - email
        - role
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
          format: email
        phone:
          type:
            - string
            - 'null'
          minLength: 6
          maxLength: 32
        role:
          $ref: '#/components/schemas/CompanyUserRole'
    CompanyUserStatusUpdateRequest:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/CompanyUserAccessStatus'
    PaymentTerms:
      type: object
      additionalProperties: false
      properties:
        paymentMode:
          type: string
          enum:
            - prepayment
            - postpayment
        defermentDays:
          type: integer
          minimum: 0
        creditLimit:
          type: number
        hasPostpayAccess:
          type: boolean
    MessageResponse:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - errors
      properties:
        code:
          type: string
          enum:
            - validation_error
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    CatalogListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CatalogSummary'
    CatalogSummary:
      type: object
      additionalProperties: false
      required:
        - code
        - name
        - isPublic
        - sortOrder
      properties:
        code:
          type: string
        name:
          type: string
        isPublic:
          type: boolean
        sortOrder:
          type: integer
    CategoryTreeResponse:
      type: object
      additionalProperties: false
      required:
        - catalogCode
        - items
      properties:
        catalogCode:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryNode'
    CategoryNode:
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - slug
        - children
      properties:
        id:
          type: string
        parentId:
          type:
            - string
            - 'null'
        name:
          type: string
        slug:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/CategoryNode'
    ProductListResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - meta
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductCardSummary'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    SearchProductsResponse:
      type: object
      additionalProperties: false
      required:
        - query
        - items
        - meta
      properties:
        query:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductCardSummary'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ProductCardSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - nomenclatureGuid
        - sku
        - name
        - slug
        - isArchived
        - isAvailableForOrder
        - availability
      properties:
        id:
          type: string
        nomenclatureGuid:
          type: string
        sku:
          type: string
        name:
          type: string
        slug:
          type: string
        brand:
          type:
            - string
            - 'null'
        imageUrl:
          type:
            - string
            - 'null'
          format: uri
        isArchived:
          type: boolean
        isAvailableForOrder:
          type: boolean
        availability:
          $ref: '#/components/schemas/ProductAvailability'
        marketplaceUrl:
          type:
            - string
            - 'null'
          format: uri
        price:
          oneOf:
            - $ref: '#/components/schemas/ProductPrice'
            - type: 'null'
    ProductDetailResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - nomenclatureGuid
        - sku
        - name
        - slug
        - catalogs
        - categories
        - attributes
        - images
        - availability
        - isArchived
        - isAvailableForOrder
      properties:
        id:
          type: string
        nomenclatureGuid:
          type: string
        sku:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type:
            - string
            - 'null'
        brand:
          type:
            - string
            - 'null'
        catalogs:
          type: array
          items:
            $ref: '#/components/schemas/CatalogSummary'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryNode'
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/ProductAttribute'
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'
        availability:
          $ref: '#/components/schemas/ProductAvailability'
        isArchived:
          type: boolean
        isAvailableForOrder:
          type: boolean
        marketplaceUrl:
          type:
            - string
            - 'null'
          format: uri
        price:
          oneOf:
            - $ref: '#/components/schemas/ProductPrice'
            - type: 'null'
    ProductImage:
      type: object
      additionalProperties: false
      required:
        - url
      properties:
        url:
          type: string
          format: uri
        alt:
          type:
            - string
            - 'null'
        isPrimary:
          type: boolean
    ProductAttribute:
      type: object
      additionalProperties: false
      required:
        - code
        - name
        - value
      properties:
        code:
          type: string
        name:
          type: string
        value:
          type:
            - string
            - number
            - integer
            - boolean
            - 'null'
    ProductAvailability:
      type: object
      additionalProperties: false
      required:
        - inStock
        - isAvailableForOrder
      properties:
        inStock:
          type: boolean
        stockQty:
          type:
            - number
            - 'null'
        productionLeadTime:
          type:
            - string
            - 'null'
        isAvailableForOrder:
          type: boolean
    ProductPrice:
      type: object
      additionalProperties: false
      description: |
        Цена товара в текущем MVP API — одна цена за единицу измерения для авторизованного B2B-клиента.
        Модель «двух цен» (кратно / некратно упаковке) из ЧТЗ 09 §3.2 и `НаборУпаковок` 1С
        здесь НЕ моделируется — это следующий слой API (post-MVP). Корзинные пересчёты
        по кратности и количественные скидки также не входят в этот объект.
      required:
        - currency
        - amount
      properties:
        currency:
          type: string
        amount:
          type: number
        baseAmount:
          type:
            - number
            - 'null'
        discountPercent:
          type:
            - number
            - 'null'
        priceTypeCode:
          type:
            - string
            - 'null'
    PaginationMeta:
      type: object
      additionalProperties: false
      required:
        - page
        - perPage
        - total
      properties:
        page:
          type: integer
          minimum: 1
        perPage:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
    OrderStatus:
      type: string
      description: >
        Six upper-level lifecycle phases mapped from 1C (see order_lifecycle_contract.md).
        Semantics match 1C only when integrationSyncState is `synced` and oneCOrderGuid is set;
        otherwise the client must rely on integrationSyncState and onboarding copy, not on status alone.
      enum:
        - processing
        - in_production
        - ready_for_picking
        - ready_to_ship
        - shipped
        - completed
    OrderIntegrationSyncState:
      type: string
      description: >
        Platform-side state of delivering the order to 1C (queue, retries). Not a seventh OrderStatus.
      enum:
        - pending
        - synced
        - failed
        - manual_review_required
    PaymentStatus:
      type: string
      enum:
        - unpaid
        - partially_paid
        - paid
    CartResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - totals
        - warnings
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totals:
          $ref: '#/components/schemas/CartTotals'
        deliveryHint:
          oneOf:
            - $ref: '#/components/schemas/DeliveryHint'
            - type: 'null'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/WarningMessage'
    CartItemUpsertRequest:
      type: object
      additionalProperties: false
      required:
        - quantity
      properties:
        quantity:
          type: number
          exclusiveMinimum: 0
    CartItem:
      type: object
      additionalProperties: false
      required:
        - productId
        - product
        - quantity
        - unit
        - unitPrice
        - lineTotal
        - availability
      properties:
        productId:
          type: string
        product:
          $ref: '#/components/schemas/ProductCardSummary'
        quantity:
          type: number
        unit:
          type: string
          description: Unit of measure from 1C (e.g. шт, кг, л)
          example: шт
        unitPrice:
          type: number
        lineTotal:
          type: number
        availability:
          $ref: '#/components/schemas/ProductAvailability'
    CartTotals:
      type: object
      additionalProperties: false
      required:
        - subtotal
        - total
        - vatAmount
        - itemsCount
      properties:
        subtotal:
          type: number
          description: Sum of all line totals before discount
        discountTotal:
          type:
            - number
            - 'null'
          description: Total discount amount (null if no discount)
        vatAmount:
          type: number
          description: VAT amount included in total (НДС)
        total:
          type: number
          description: Final total (includes VAT)
        itemsCount:
          type: integer
          description: Number of unique line items (позиций)
    DeliveryHint:
      type: object
      additionalProperties: false
      properties:
        freeDeliveryThreshold:
          type: number
        amountToFreeDelivery:
          type:
            - number
            - 'null'
        message:
          type:
            - string
            - 'null'
    WarningMessage:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    CheckoutPreviewRequest:
      type: object
      additionalProperties: false
      required:
        - deliveryAddress
        - contactName
        - contactPhone
      properties:
        deliveryAddress:
          type: string
          minLength: 1
          maxLength: 1000
        contactName:
          type: string
          minLength: 1
          maxLength: 255
        contactPhone:
          type: string
          minLength: 6
          maxLength: 32
        comment:
          type: string
          maxLength: 2000
    CheckoutPreviewResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - totals
        - paymentTerms
        - warnings
      properties:
        items:
          type: array
          items:
